name: "Terraform Deploy"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: "us-east-1"

jobs:
  terraform-deploy:
    name: "Plan & Apply"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="vpc_id=${{ secrets.TF_VAR_VPC_ID }}" \
            -var="public_subnet_ids=${{ secrets.TF_VAR_PUBLIC_SUBNET_IDS }}" \
            -var="private_subnet_ids=${{ secrets.TF_VAR_PRIVATE_SUBNET_IDS }}" \
            -var="ami_id=${{ secrets.TF_VAR_AMI_ID }}" \
            -var="key_name=${{ secrets.TF_VAR_KEY_NAME }}" \
            -var="db_username=${{ secrets.TF_VAR_DB_USERNAME }}" \
            -var="db_password=${{ secrets.TF_VAR_DB_PASSWORD }}" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Output ALB DNS
        run: terraform output alb_dns_name
